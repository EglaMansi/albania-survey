<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albania Household Survey</title>

<!--
════════════════════════════════════════════════════════════════
  SETUP INSTRUCTIONS — READ BEFORE PUBLISHING
════════════════════════════════════════════════════════════════

  1. Create your three Google Forms (Control, T1, T2).

  2. For each form, click "Send" → link icon → copy the link.
     Paste each link into the three variables below.

  3. Host this file on GitHub Pages (free, 2 minutes):
     a. Go to github.com → New repository → name it e.g. "albania-survey"
     b. Upload this file as "index.html"
     c. Go to Settings → Pages → Source: main branch → Save
     d. Your public URL will be: https://[your-username].github.io/albania-survey/
     Share ONLY that one URL with respondents.

  4. The page logs each assignment to localStorage so you can
     audit the distribution from your own browser during testing.
     This does NOT track respondents — localStorage is per-device.

  5. To check the split during fieldwork: open the browser console
     on any device that completed the survey and run:
         JSON.parse(localStorage.getItem('rct_log') || '[]')
     But the real record is Google Sheets — trust that.

  IMPORTANT: Update FORM_LINKS below before publishing.
════════════════════════════════════════════════════════════════
-->

<script>
  // ── PASTE YOUR THREE GOOGLE FORM LINKS HERE ──────────────────
  const FORM_LINKS = {
    C:  "https://docs.google.com/forms/d/e/1FAIpQLSfa7Axv8QUjeKxvSBKH_-QthKd_5AmXcRM7xHLIO15Wk93WOA/viewform?usp=dialog",
    T1: "https://docs.google.com/forms/d/e/1FAIpQLSfXhFW_RMMZo6s03JF4aTO82WD8q1bO7Pp0FldzF-jV6OxuLw/viewform?usp=publish-editor",
    T2: "https://docs.google.com/forms/d/e/1FAIpQLScrTNJh5Jroljte-Yg5hduIFcVkGY_uLg3Il-Bv3eJKjNVdug/viewform?usp=publish-editor",
  };
  // ─────────────────────────────────────────────────────────────

  // Optional: study title shown on the loading screen
  const STUDY_TITLE = "Household Economic Expectations Survey — Albania";
  const INSTITUTION = "Epoka University / University of Tirana";

  // ── RANDOMISATION ─────────────────────────────────────────────
  // Pure 1:1:1 random assignment. No cookies, no tracking.
  function assignArm() {
    const arms = ['C', 'T1', 'T2'];
    return arms[Math.floor(Math.random() * 3)];
  }

  // ── REDIRECT ──────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', function () {
    const arm  = assignArm();
    const dest = FORM_LINKS[arm];

    // Update the loading message
    document.getElementById('arm-label').textContent = arm;

    // Audit log (local only, no personal data)
    try {
      const log = JSON.parse(localStorage.getItem('rct_log') || '[]');
      log.push({ arm, ts: new Date().toISOString() });
      localStorage.setItem('rct_log', JSON.stringify(log));
    } catch(e) {}

    // Redirect after a brief pause so the loading screen renders
    setTimeout(function () {
      window.location.replace(dest);
    }, 1200);
  });
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; font-family: 'Segoe UI', Arial, sans-serif;
    background: #F5F7FA; color: #222;
  }
  .center {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .card {
    background: #fff;
    border: 1px solid #D0D7E2;
    border-radius: 14px;
    padding: 40px 48px;
    max-width: 480px; width: 100%;
  }
  .logo-bar {
    font-size: 12px; color: #888; letter-spacing: .06em;
    text-transform: uppercase; margin-bottom: 28px;
  }
  h1 { font-size: 19px; color: #1F3864; margin-bottom: 8px; font-weight: 600; }
  .sub { font-size: 14px; color: #666; margin-bottom: 32px; line-height: 1.6; }

  /* Spinner */
  .spinner-wrap { margin: 0 auto 24px; width: 48px; height: 48px; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #D0D7E2;
    border-top-color: #2E75B6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status { font-size: 14px; color: #555; line-height: 1.7; }
  .status strong { color: #1F3864; }

  /* Hidden arm label — only visible in page source / console, not to respondent */
  #arm-label { display: none; }

  .footer {
    margin-top: 24px; font-size: 12px; color: #aaa; line-height: 1.6;
  }
</style>
</head>
<body>
<div class="center">
  <div class="card">
    <div class="logo-bar">Research Survey · 2025</div>
    <h1>Household Economic Expectations Survey</h1>
    <p class="sub">Albania · <em>Epoka University / University of Rome Tor Vergata</em></p>

    <div class="spinner-wrap"><div class="spinner"></div></div>

    <p class="status">
      Preparing your survey&hellip;<br>
      <strong>You will be redirected in a moment.</strong><br>
      Please do not close this page.
    </p>

    <!-- Hidden — not shown to respondent -->
    <span id="arm-label"></span>
  </div>

  <div class="footer">
    If you are not redirected within 5 seconds,
    please refresh the page.
  </div>
</div>
</body>
</html>
